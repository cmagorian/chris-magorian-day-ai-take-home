<svg width="100%" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
<!-- Adaptive light/dark theme via prefers-color-scheme (see <style> below). -->
<title>Endpoint workflow for the Secret Santa API</title>
<desc>Express routes on the left map to domain and storage handlers in the middle. Both the bulk draw and the per-person draw call a notification hook on the right, whose default implementation is a stub that logs each match.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
/* light theme (default / fallback) */
.bg{fill:#ffffff;}
.t{font-size:14px;fill:#1f2937;}
.th{font-size:14px;font-weight:500;fill:#111827;}
.ts{font-size:12px;fill:#6b7280;}
.conn{stroke:#64748b;stroke-width:1.5;fill:none;}
.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;}
.c-blue rect{fill:#dbeafe;stroke:#3b82f6;stroke-width:1.5;}
.c-blue text{fill:#1e3a8a;}
.c-amber rect{fill:#fef3c7;stroke:#f59e0b;stroke-width:1.5;}
.c-amber text{fill:#92400e;}
/* dark theme — applied automatically when the viewer prefers dark */
@media (prefers-color-scheme: dark){
.bg{fill:#0f172a;}
.t{fill:#e2e8f0;}
.th{fill:#f1f5f9;}
.ts{fill:#94a3b8;}
.conn{stroke:#94a3b8;}
.box{fill:#1e293b;stroke:#475569;}
.c-blue rect{fill:#1e3a8a;stroke:#60a5fa;}
.c-blue text{fill:#bfdbfe;}
.c-amber rect{fill:#7c2d12;stroke:#fbbf24;}
.c-amber text{fill:#fde68a;}
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path class="conn" d="M2 1L8 5L2 9" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect class="bg" x="0" y="0" width="680" height="460"/>
<text class="th" x="130" y="40" text-anchor="middle">express routes</text>
<text class="th" x="342" y="40" text-anchor="middle">domain + storage</text>
<text class="th" x="557" y="40" text-anchor="middle">notification</text>

<!-- arrows: routes -> handlers -->
<line class="conn" x1="220" y1="80" x2="255" y2="80" marker-end="url(#arrow)"/>
<line class="conn" x1="220" y1="132" x2="255" y2="132" marker-end="url(#arrow)"/>
<line class="conn" x1="220" y1="190" x2="255" y2="190" marker-end="url(#arrow)"/>
<line class="conn" x1="220" y1="254" x2="255" y2="254" marker-end="url(#arrow)"/>
<line class="conn" x1="220" y1="318" x2="255" y2="318" marker-end="url(#arrow)"/>
<line class="conn" x1="220" y1="376" x2="255" y2="376" marker-end="url(#arrow)"/>

<!-- both draw handlers -> notify -->
<line class="conn" x1="430" y1="190" x2="475" y2="216" marker-end="url(#arrow)"/>
<line class="conn" x1="430" y1="254" x2="475" y2="236" marker-end="url(#arrow)"/>
<text class="ts" x="452" y="200" text-anchor="middle">fresh</text>

<!-- routes column (blue) -->
<g class="c-blue"><rect x="40" y="58" width="180" height="44" rx="6"/>
<text class="th" x="50" y="80">POST /families</text><text class="ts" x="50" y="95">create family</text></g>
<g class="c-blue"><rect x="40" y="110" width="180" height="44" rx="6"/>
<text class="th" x="50" y="132">GET /families/:id</text><text class="ts" x="50" y="147">fetch family</text></g>
<g class="c-blue"><rect x="40" y="162" width="180" height="56" rx="6"/>
<text class="th" x="50" y="182">POST /families/:id</text><text class="th" x="50" y="198">/exchanges</text><text class="ts" x="50" y="214">draw everyone</text></g>
<g class="c-blue"><rect x="40" y="226" width="180" height="56" rx="6"/>
<text class="th" x="50" y="246">POST .../members/:id</text><text class="th" x="50" y="262">/draws</text><text class="ts" x="50" y="278">one person draws</text></g>
<g class="c-blue"><rect x="40" y="290" width="180" height="56" rx="6"/>
<text class="th" x="50" y="310">GET /families/:id</text><text class="th" x="50" y="326">/exchanges</text><text class="ts" x="50" y="342">history log</text></g>
<g class="c-blue"><rect x="40" y="354" width="180" height="44" rx="6"/>
<text class="th" x="50" y="376">GET /health · /ready</text><text class="ts" x="50" y="391">liveness · readiness</text></g>

<!-- domain column (neutral) -->
<rect class="box" x="255" y="58" width="175" height="44" rx="6"/>
<text class="th" x="265" y="80">createFamily()</text><text class="ts" x="265" y="95">→ sqlite (3 tables)</text>
<rect class="box" x="255" y="110" width="175" height="44" rx="6"/>
<text class="th" x="265" y="132">getFamily()</text><text class="ts" x="265" y="147">→ sqlite read</text>
<rect class="box" x="255" y="162" width="175" height="56" rx="6"/>
<text class="th" x="265" y="182">drawExchange()</text><text class="ts" x="265" y="198">complete everyone</text><text class="ts" x="265" y="214">feasibility-guarded</text>
<rect class="box" x="255" y="226" width="175" height="56" rx="6"/>
<text class="th" x="265" y="246">drawForMember()</text><text class="ts" x="265" y="262">one feasible pick</text><text class="ts" x="265" y="278">append exchange_events</text>
<rect class="box" x="255" y="290" width="175" height="56" rx="6"/>
<text class="th" x="265" y="310">listExchanges()</text><text class="ts" x="265" y="326">ordered event log</text>
<rect class="box" x="255" y="354" width="175" height="44" rx="6"/>
<text class="th" x="265" y="376">static response</text><text class="ts" x="265" y="391">no domain access</text>

<!-- notification column (amber) -->
<g class="c-amber"><rect x="475" y="198" width="165" height="56" rx="6"/>
<text class="th" x="485" y="221">notify participants</text><text class="ts" x="485" y="237">stub — logs each match</text></g>

<!-- legend + footnote -->
<g class="c-blue"><rect x="40" y="416" width="12" height="12" rx="3"/></g>
<text class="ts" x="58" y="426">routes</text>
<rect class="box" x="120" y="416" width="12" height="12" rx="3"/>
<text class="ts" x="138" y="426">domain</text>
<g class="c-amber"><rect x="220" y="416" width="12" height="12" rx="3"/></g>
<text class="ts" x="238" y="426">notification</text>
<text class="ts" x="40" y="446">per-person draws are feasibility-guarded · errors → 400 / 404 / 409 / 422</text>
</svg>
